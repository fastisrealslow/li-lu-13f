name: Update 13F Data

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest 13F from SEC EDGAR
        run: python3 fetch_13f.py --full

      - name: Fetch stock prices
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python3 fetch_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data.json prices.json hk_holdings.json; then
            echo "No changes"
          else
            git add data.json prices.json hk_holdings.json
            git commit -m "auto: update 13F data & prices"
            git push
            echo "Changes pushed!"
          fi