name: Test LLM Ticker Finder

on:
  push:
    paths:
      - '.github/workflows/test_llm_ticker.yml'
      - 'test_llm_ticker.py'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install yfinance rapidfuzz requests -q
      - name: Run LLM ticker finder for 01171.HK
        env:
          SILICONFLOW_KEY: ${{ secrets.SILICONFLOW_KEY }}
        run: python3 test_llm_ticker.py
