name: Test LLM Ticker Finder

on:
  workflow_dispatch:
    inputs:
      parent_ticker:
        description: '母公司 ticker（如 01171.HK）'
        required: true
        default: '01171.HK'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install yfinance rapidfuzz requests -q

      - name: Run LLM ticker finder
        env:
          SILICONFLOW_KEY: ${{ secrets.SILICONFLOW_KEY }}
          PARENT_TICKER: ${{ github.event.inputs.parent_ticker }}
        run: |
          python3 << 'PYEOF'
          import os, sys, json, re, warnings
          import yfinance as yf
          import requests
          import pandas as pd
          from rapidfuzz import fuzz, process as rfprocess
          warnings.filterwarnings('ignore')

          api_key = os.environ.get('SILICONFLOW_KEY', '')
          parent_ticker = os.environ.get('PARENT_TICKER', '01171.HK')

          # 加载公告标题（从 spinoff.json）
          d = json.load(open('spinoff.json'))
          company = next((c for c in d['companies'] if c['ticker'] == parent_ticker), None)
          if not company:
              print(f"❌ {parent_ticker} not found in spinoff.json")
              sys.exit(1)

          titles = [a.get('title','') for a in company.get('announcements', [])]
          parent_name = company.get('stockName', '')
          print(f"Parent: {parent_ticker} {parent_name}")
          print(f"Announcements ({len(titles)}):")
          for t in titles: print(f"  - {t}")

          # 调用 LLM
          titles_text = '\n'.join(f'- {t}' for t in titles[:8])
          prompt = f"""你是港股分拆研究员。「{parent_name}」（{parent_ticker}）的分拆公告：

{titles_text}

子公司已上市或即将上市。请推断：子公司名称（中/英）及股票代码（ticker）。
港股格式：4-5位数字.HK（如7618.HK）；A股：6位.SS或.SZ；新三板：6位纯数字。

只返回JSON，不加其他文字：
{{"spinoff_name_cn":"中文名","spinoff_name_en":"英文名","ticker":"代码","confidence":0到100,"reasoning":"推断依据"}}"""

          print(f"\n--- LLM Prompt ---")
          print(prompt)
          print("------------------\n")

          resp = requests.post(
              'https://api.siliconflow.cn/v1/chat/completions',
              headers={'Authorization': f'Bearer {api_key}', 'Content-Type': 'application/json'},
              json={'model': 'Qwen/Qwen3-8B', 'messages': [{'role':'user','content':prompt}],
                    'temperature': 0.1, 'max_tokens': 400, 'enable_thinking': False},
              timeout=30
          )
          print(f"HTTP status: {resp.status_code}")
          raw = resp.json()['choices'][0]['message']['content'].strip()
          print(f"LLM raw response:\n{raw}\n")

          m = re.search(r'\{[\s\S]+?\}', raw)
          if not m:
              print("❌ No JSON found in response")
              sys.exit(1)

          result = json.loads(m.group())
          print(f"Parsed result: {json.dumps(result, ensure_ascii=False, indent=2)}")

          # yfinance 验证
          ticker = result.get('ticker','').strip()
          if ticker:
              if ticker.upper().endswith('.HK'):
                  code = ticker[:-3].lstrip('0') or '0'
                  ticker = code + '.HK'
              print(f"\nVerifying ticker: {ticker}")
              try:
                  df = yf.download(ticker, period='5d', auto_adjust=True, progress=False)
                  if not df.empty:
                      c = df['Close']
                      if isinstance(c, pd.DataFrame): c = c.iloc[:,0]
                      v = c.dropna()
                      price = round(float(v.iloc[-1]), 3) if not v.empty else None
                      print(f"✅ Ticker valid! price={price}")
                  else:
                      print(f"❌ yfinance returned empty data for {ticker}")
              except Exception as e:
                  print(f"❌ yfinance error: {e}")
          else:
              print("⚠️  LLM returned no ticker")
          PYEOF
